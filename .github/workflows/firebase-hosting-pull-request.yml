name: Deploy to Firebase Hosting on PR

on: pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: swapspace

      # Create .env file for web runtime config
      - name: Create .env file
        working-directory: swapspace
        env:
          WEB_SECRET: ${{ secrets.Web }}
        run: |
          test -n "$WEB_SECRET" || (echo "Missing Web secret" && exit 1)
          printf "%s\n" "$WEB_SECRET" > .env

      - name: Validate required Firebase web secrets
        working-directory: swapspace
        env:
          WEB_SECRET: ${{ secrets.Web }}
        run: |
          test -n "$WEB_SECRET" || (echo "Missing Web secret" && exit 1)
          grep -q '^FIREBASE_WEB_API_KEY=' .env || (echo "Missing FIREBASE_WEB_API_KEY in Web secret" && exit 1)
          grep -q '^FIREBASE_WEB_APP_ID=' .env || (echo "Missing FIREBASE_WEB_APP_ID in Web secret" && exit 1)
          grep -q '^FIREBASE_WEB_MESSAGING_SENDER_ID=' .env || (echo "Missing FIREBASE_WEB_MESSAGING_SENDER_ID in Web secret" && exit 1)
          grep -q '^FIREBASE_WEB_PROJECT_ID=' .env || (echo "Missing FIREBASE_WEB_PROJECT_ID in Web secret" && exit 1)

      - name: Build Flutter Web
        run: flutter build web --pwa-strategy=none
        working-directory: swapspace

      - name: Deploy Preview to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SWAPSPACE_ADD2D }}
          projectId: swapspace-add2d
          entryPoint: swapspace
