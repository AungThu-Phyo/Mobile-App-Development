name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'

      - run: flutter pub get
        working-directory: swapspace

      # Create .env file for web runtime config
      - name: Create .env file
        working-directory: swapspace
        run: echo "${{ secrets.Web }}" > .env

      # Verify .env has content
      - name: Verify .env has content
        working-directory: swapspace
        run: |
          echo "Line count: $(wc -l < .env)"
          echo "Keys found:"
          grep -o '^[^=]*' .env

      # Validate required keys
      - name: Validate required Firebase web secrets
        working-directory: swapspace
        run: |
          grep -q '^FIREBASE_WEB_API_KEY=' .env              || (echo "Missing FIREBASE_WEB_API_KEY" && exit 1)
          grep -q '^FIREBASE_WEB_APP_ID=' .env               || (echo "Missing FIREBASE_WEB_APP_ID" && exit 1)
          grep -q '^FIREBASE_WEB_MESSAGING_SENDER_ID=' .env  || (echo "Missing FIREBASE_WEB_MESSAGING_SENDER_ID" && exit 1)
          grep -q '^FIREBASE_WEB_PROJECT_ID=' .env           || (echo "Missing FIREBASE_WEB_PROJECT_ID" && exit 1)
          echo "✅ All required keys present"

      # Build web
      - run: flutter build web --pwa-strategy=none
        working-directory: swapspace

      # Verify .env was bundled into build output
      - name: Verify .env in build output
        working-directory: swapspace
        run: |
          cat build/web/assets/.env 2>/dev/null | grep -o '^[^=]*' \
            || echo "❌ .env NOT found in build/web/assets/"

      # Deploy to Firebase
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SWAPSPACE_ADD2D }}
          channelId: live
          projectId: swapspace-add2d
          entryPoint: swapspace