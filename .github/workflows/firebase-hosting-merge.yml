name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'

      # Install dependencies
      - run: flutter pub get
        working-directory: swapspace

      # Create .env file for web runtime config
      - name: Create .env file
        working-directory: swapspace
        run: |
          cat > .env << 'EOF'
          FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}
          FIREBASE_WEB_APP_ID=${{ secrets.FIREBASE_WEB_APP_ID }}
          FIREBASE_WEB_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_WEB_MESSAGING_SENDER_ID }}
          FIREBASE_WEB_PROJECT_ID=${{ secrets.FIREBASE_WEB_PROJECT_ID }}
          FIREBASE_WEB_AUTH_DOMAIN=${{ secrets.FIREBASE_WEB_AUTH_DOMAIN }}
          FIREBASE_WEB_STORAGE_BUCKET=${{ secrets.FIREBASE_WEB_STORAGE_BUCKET }}
          FIREBASE_WEB_MEASUREMENT_ID=${{ secrets.FIREBASE_WEB_MEASUREMENT_ID }}
          EOF

      - name: Validate required Firebase web secrets
        working-directory: swapspace
        run: |
          test -n "${{ secrets.FIREBASE_WEB_API_KEY }}" || (echo "Missing FIREBASE_WEB_API_KEY secret" && exit 1)
          test -n "${{ secrets.FIREBASE_WEB_APP_ID }}" || (echo "Missing FIREBASE_WEB_APP_ID secret" && exit 1)
          test -n "${{ secrets.FIREBASE_WEB_MESSAGING_SENDER_ID }}" || (echo "Missing FIREBASE_WEB_MESSAGING_SENDER_ID secret" && exit 1)
          test -n "${{ secrets.FIREBASE_WEB_PROJECT_ID }}" || (echo "Missing FIREBASE_WEB_PROJECT_ID secret" && exit 1)

      # Build web
      - run: flutter build web --pwa-strategy=none
        working-directory: swapspace

      # Deploy to Firebase
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SWAPSPACE_ADD2D }}
          channelId: live
          projectId: swapspace-add2d
          entryPoint: swapspace
