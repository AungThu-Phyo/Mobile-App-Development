name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'

      # Install dependencies
      - run: flutter pub get
        working-directory: swapspace

      # 🔥 Create .env file (FIX)
      - name: Create .env file
        working-directory: swapspace
        run: |
          echo "API_URL=${{ secrets.API_URL }}" >> .env
          echo "STRIPE_KEY=${{ secrets.STRIPE_KEY }}" >> .env
          echo "SOME_CONFIG=${{ secrets.SOME_CONFIG }}" >> .env

      # Build web
      - run: flutter build web --pwa-strategy=none
        working-directory: swapspace

      # Deploy to Firebase
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SWAPSPACE_ADD2D }}
          channelId: live
          projectId: swapspace-add2d
          entryPoint: swapspace
